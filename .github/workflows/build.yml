name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Install trunk
      run: cargo install trunk
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Backend
      run: |
        cd src-tauri
        cargo build --release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-trading-dashboard-linux
        path: src-tauri/target/release/desktop-dashboard-tauri

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Install trunk
      run: cargo install trunk
    
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    
    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Backend
      run: |
        cd src-tauri
        cargo build --release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-trading-dashboard-windows
        path: src-tauri/target/release/desktop-dashboard-tauri.exe
